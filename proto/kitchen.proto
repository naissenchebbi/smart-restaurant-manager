syntax = "proto3";

package kitchen;

service KitchenService {
  rpc GetKitchenQueue (Empty) returns (QueueReply);
  rpc MarkOrderReady (MarkOrderReadyRequest) returns (ReadyReply);
  rpc GetOrderStatus (GetOrderStatusRequest) returns (OrderStatusReply);
  rpc AddKitchenStaff (AddStaffRequest) returns (StaffReply);
}

message Empty {}

message QueueOrder {
  string order_id = 1;
  string items_json = 2;
  string received_at = 3;
  string status = 4;
  string chef_name = 5;
}

message QueueReply {
  repeated QueueOrder orders = 1;
}

message MarkOrderReadyRequest {
  string order_id = 1;
}

message ReadyReply {
  bool success = 1;
  string message = 2;
}

message GetOrderStatusRequest {
  string order_id = 1;
}

message OrderStatusReply {
  string order_id = 1;
  string status = 2;
  string ready_at = 3;
}

message AddStaffRequest {
  string name = 1;
  string role = 2;
}

message StaffReply {
  int32 id = 1;
  string name = 2;
  string role = 3;
  bool success = 4;
}