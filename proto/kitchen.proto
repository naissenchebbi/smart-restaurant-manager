syntax = "proto3";

service KitchenService {
  rpc GetQueue (GetQueueRequest) returns (QueueResponse);
  rpc UpdatePreparationStatus (UpdateStatusRequest) returns (StatusResponse);
  rpc GetOrderFromQueue (GetQueueOrderRequest) returns (QueueOrderResponse);
}

message GetQueueRequest {
  string restaurant_id = 1;
}

message QueueResponse {
  repeated QueueOrder orders = 1;
}

message QueueOrder {
  string order_id = 1;
  string items_json = 2;
  string received_at = 3;
  string status = 4;
  string chef_name = 5;
}

message UpdateStatusRequest {
  string order_id = 1;
  string status = 2;
  string chef_name = 3;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message GetQueueOrderRequest {
  string order_id = 1;
}

message QueueOrderResponse {
  string order_id = 1;
  string status = 2;
  string started_at = 3;
  string completed_at = 4;
}